<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | FlightSchoolLoan.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      width: min(420px, 92%);
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 10px; }
    p { color: #64748b; margin: 0 0 20px; }
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #d4a84f;
      color: #0a1728;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      font-size: 15px;
    }
    button:disabled {
      background: #b8956a;
      cursor: not-allowed;
    }
    .secondary {
      background: #0a1728;
      color: white;
    }
    .secondary:disabled {
      background: #1a2340;
    }
    .message {
      margin-top: 14px;
      font-size: 14px;
      color: #0f766e;
      min-height: 20px;
      padding: 10px;
      border-radius: 8px;
    }
    .error { 
      color: #991b1b;
      background: #fee2e2;
    }
    .success {
      color: #166534;
      background: #dcfce7;
    }
    .loading {
      color: #1e40af;
      background: #dbeafe;
    }
    .debug-info {
      margin-top: 20px;
      padding: 10px;
      background: #f3f4f6;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      max-height: 100px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login / Sign Up</h1>
    <p>Access your application portal.</p>

    <input type="email" id="email" placeholder="Email address" />
    <input type="password" id="password" placeholder="Password" />

    <button id="signupBtn">Create Account</button>
    <button id="loginBtn" class="secondary">Log In</button>

    <div id="message" class="message"></div>
    <div id="debugInfo" class="debug-info" style="display: none;"></div>
  </div>

  <script>
    const supabaseUrl = "https://rfepvfyrgjojuavjassby.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZXB2ZnlyZ2pvdWFqdmFzc2J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODA4MDgsImV4cCI6MjA4OTQ1NjgwOH0.9vFK8aB0CQb8JozNlFQzT9Vo8l6e-zKMlmOeU4pKsrU";
    
    let supabase = null;
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const messageEl = document.getElementById("message");
    const debugInfoEl = document.getElementById("debugInfo");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");

    // Debug logging function
    function logDebug(message) {
      const timestamp = new Date().toLocaleTimeString();
      const debugText = `[${timestamp}] ${message}`;
      console.log(debugText);
      debugInfoEl.innerHTML += debugText + "<br>";
      debugInfoEl.style.display = "block";
    }

    function showMessage(text, type = "message") {
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
    }

    // Initialize Supabase
    async function initSupabase() {
      logDebug("Initializing Supabase...");
      
      try {
        if (!window.supabase) {
          throw new Error("Supabase library not loaded from CDN");
        }
        
        supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        logDebug("Supabase initialized successfully");
        
        // Check for existing session
        checkExistingSession();
      } catch (error) {
        logDebug(`ERROR initializing Supabase: ${error.message}`);
        showMessage("Failed to load authentication. Please refresh the page.", "error");
      }
    }

    // Check if user is already logged in
    async function checkExistingSession() {
      try {
        const { data: { session }, error } = await supabase.auth.getSession();
        
        if (error) {
          logDebug(`Session check error: ${error.message}`);
          return;
        }
        
        if (session && session.user) {
          logDebug(`User already logged in: ${session.user.email}`);
          showMessage("Already logged in. Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1000);
        }
      } catch (error) {
        logDebug(`ERROR checking session: ${error.message}`);
      }
    }

    // Sign up handler
    document.getElementById("signupBtn").addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value.trim();

      if (!email || !password) {
        showMessage("Enter email and password.", "error");
        return;
      }

      if (password.length < 6) {
        showMessage("Password must be at least 6 characters.", "error");
        return;
      }

      signupBtn.disabled = true;
      loginBtn.disabled = true;
      logDebug(`Attempting signup for: ${email}`);
      showMessage("Creating account...", "loading");

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password
        });

        if (error) {
          logDebug(`Signup error: ${error.message}`);
          showMessage(`Signup failed: ${error.message}`, "error");
          return;
        }

        logDebug(`Signup successful for ${email}`);
        showMessage("Account created! Check your email for confirmation.", "success");
        emailEl.value = "";
        passwordEl.value = "";
      } catch (error) {
        logDebug(`ERROR during signup: ${error.message}`);
        showMessage(`Error: ${error.message}`, "error");
      } finally {
        signupBtn.disabled = false;
        loginBtn.disabled = false;
      }
    });

    // Login handler
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value.trim();

      if (!email || !password) {
        showMessage("Enter email and password.", "error");
        return;
      }

      signupBtn.disabled = true;
      loginBtn.disabled = true;
      logDebug(`Attempting login for: ${email}`);
      showMessage("Logging in...", "loading");

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) {
          logDebug(`Login error: ${error.message}`);
          showMessage(`Login failed: ${error.message}`, "error");
          return;
        }

        if (!data.session) {
          logDebug("No session returned after login");
          showMessage("Login successful but no session created. Please try again.", "error");
          return;
        }

        logDebug(`Login successful for ${email}`);
        showMessage("Login successful! Redirecting to dashboard...", "success");
        
        // Give user feedback before redirecting
        setTimeout(() => {
          logDebug(`Redirecting to dashboard.html`);
          window.location.href = "dashboard.html";
        }, 1500);
      } catch (error) {
        logDebug(`ERROR during login: ${error.message}`);
        showMessage(`Error: ${error.message}`, "error");
      } finally {
        signupBtn.disabled = false;
        loginBtn.disabled = false;
      }
    });

    // Initialize on page load
    window.addEventListener("load", initSupabase);

    // Fallback initialization if load event doesn't fire
    setTimeout(() => {
      if (!supabase) {
        logDebug("Load event timeout - initializing Supabase manually");
        initSupabase();
      }
    }, 2000);
  </script>
</body>
</html>

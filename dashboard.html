<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FlightSchoolLoan.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      margin: 0;
      padding: 40px 20px;
    }

    .wrap {
      width: min(900px, 94%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
    }

    button, a.btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      text-decoration: none;
      background: #d4a84f;
      color: #0a1728;
      font-weight: 700;
      cursor: pointer;
    }

    .muted {
      color: #64748b;
    }

    .app-row {
      padding: 14px 0;
      border-bottom: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Your Dashboard</h1>
      <div>
        <a class="btn" href="application.html">Start / Update Application</a>
        <button id="logoutBtn">Log Out</button>
      </div>
    </div>

    <div class="card">
      <h2>Your Application</h2>
      <p class="muted">This is where your submitted application will appear.</p>
      <div id="appList">Loading...</div>
    </div>
  </div>

  <script>
    const supabaseUrl = "https://rfepvfyrgjojuavjassby.supabase.co";
    const supabaseKey = "PASTE_YOUR_REAL_ANON_PUBLIC_KEY_HERE";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function loadDashboard() {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const { data, error } = await supabase
        .from("applications")
        .select("*")
        .order("created_at", { ascending: false });

      const appList = document.getElementById("appList");

      if (error) {
        appList.innerHTML = `<p class="muted">Error loading application: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        appList.innerHTML = `
          <p class="muted">No application submitted yet.</p>
          <p><a class="btn" href="application.html">Start Application</a></p>
        `;
        return;
      }

      appList.innerHTML = data.map(app => `
        <div class="app-row">
          <strong>${app.full_name || "Application"}</strong><br>
          <span class="muted">Program: ${app.program || "N/A"}</span><br>
          <span class="muted">Flight School: ${app.flight_school || "N/A"}</span><br>
          <span class="muted">Status: ${app.status || "Submitted"}</span>
        </div>
      `).join("");
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    });

    loadDashboard();
  </script>
</body>
</html>

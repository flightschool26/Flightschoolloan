<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body style="font-family: Arial, sans-serif; padding: 40px; background: #f8fafc;">
  <h1>Welcome to your dashboard</h1>

  <button id="logoutBtn">Log Out</button>

  <script>
    const supabaseUrl = "https://rfepvfyrgjojuavjassby.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZXB2ZnlyZ2pvdWFqdmFzc2J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODA4MDgsImV4cCI6MjA4OTQ1NjgwOH0.9vFK8aB0CQb8JozNlFQzT9Vo8l6e-zKMlmOeU4pKsrU";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function checkUser() {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        window.location.href = "login.html";
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    });

    checkUser();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | FlightSchoolLoan.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles/login.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="card">
    <h1>Login / Sign Up</h1>
    <p>Access your application portal.</p>

    <form id="authForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          placeholder="you@example.com" 
          required
          aria-label="Email address"
          aria-describedby="emailError"
        />
        <span id="emailError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="••••••••" 
          required
          aria-label="Password"
          aria-describedby="passwordError passwordStrength"
        />
        <span id="passwordError" class="error-text"></span>
        <div id="passwordStrength" class="password-strength" aria-live="polite"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword" id="confirmPasswordLabel" class="hidden">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          placeholder="••••••••" 
          class="hidden"
          aria-label="Confirm password"
          aria-describedby="confirmPasswordError"
        />
        <span id="confirmPasswordError" class="error-text"></span>
      </div>

      <div class="checkbox-group">
        <input 
          type="checkbox" 
          id="rememberMe" 
          aria-label="Remember me"
        />
        <label for="rememberMe">Remember me</label>
      </div>

      <button type="button" id="signupBtn" aria-label="Create a new account">
        <span class="button-text">Create Account</span>
        <span class="spinner hidden"></span>
      </button>
      <button type="button" id="loginBtn" class="secondary" aria-label="Log in to your account">
        <span class="button-text">Log In</span>
        <span class="spinner hidden"></span>
      </button>

      <a href="#" id="toggleForm" class="toggle-form">Don't have an account? Sign up</a>
    </form>

    <div id="message" class="message" role="alert" aria-live="polite"></div>
    <a href="#" id="forgotPassword" class="forgot-password">Forgot Password?</a>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>

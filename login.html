<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding: 40px;">

  <h2>Login / Sign Up</h2>

  <input id="email" placeholder="Email" /><br><br>
  <input id="password" type="password" placeholder="Password" /><br><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Log In</button>

  <p id="msg"></p>

  <script>
    const supabase = window.supabase.createClient(
      "https://rfepvfyrgjojuavjassby.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZXB2ZnlyZ2pvdWFqdmFzc2J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODA4MDgsImV4cCI6MjA4OTQ1NjgwOH0.9vFK8aB0CQb8JozNlFQzT9Vo8l6e-zKMlmOeU4pKsrU"
    );

    function msg(t) {
      document.getElementById("msg").innerText = t;
    }

    async function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signUp({ email, password });

      if (error) {
        msg(error.message);
      } else {
        msg("Account created. Now log in.");
      }
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        msg(error.message);
      } else {
        window.location.href = "dashboard.html";
      }
    }
  </script>

</body>
</html>
